{% extends "base/base.html" %}
{% load crispy_forms_tags %}
{% block title %}Новий пароль{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h2 class="mb-4" style="font-family:'Playfair Display',serif;">Встановити новий пароль</h2>
      {% if validlink %}
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-accent w-100 mt-2">Зберегти пароль</button>
      </form>
      {% else %}
      <div class="alert alert-danger">Посилання недійсне або вже використане. <a href="{% url 'accounts:password_reset' %}">Спробуйте знову</a>.</div>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
