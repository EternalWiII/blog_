{% extends "base/base.html" %}
{% block title %}Пароль змінено{% endblock %}
{% block content %}

    <div class="card p-4">
      <i class="bi bi-check-circle text-success" style="font-size:3rem;"></i>
      <h3 class="mt-3" style="font-family:'Playfair Display',serif;">Пароль змінено!</h3>

      <a href="{% url 'accounts:login' %}" class="btn btn-accent">Увійти</a>

  </div>
</div>
{% endblock %}
