{% extends "base/base.html" %}
{% load crispy_forms_tags %}
{% block title %}Скидання паролю{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h2 class="mb-2" style="font-family:'Playfair Display',serif;">Скинути пароль</h2>
      <p class="text-muted small mb-4">Введіть email — ми надішлемо посилання для відновлення паролю.</p>
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-accent w-100 mt-2">Надіслати лист</button>
      </form>
      <div class="text-center mt-3">
        <a href="{% url 'accounts:login' %}" class="small text-muted">Повернутись до входу</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
