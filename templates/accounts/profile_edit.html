{% extends "base/base.html" %}
{% load crispy_forms_tags %}
{% block title %}Редагувати профіль — Блог{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card p-4">
      <h2 style="font-family:'Playfair Display',serif;" class="mb-4">Редагувати профіль</h2>
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <h6 class="text-muted mb-3">Основна інформація</h6>
        {{ user_form|crispy }}
        <hr class="divider"/>
        <h6 class="text-muted mb-3">Про себе</h6>
        {{ profile_form|crispy }}
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-accent">Зберегти зміни</button>
          <a href="{% url 'accounts:profile' request.user.username %}" class="btn btn-outline-secondary">Скасувати</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
