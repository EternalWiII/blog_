{% extends "base/base.html" %}
{% load crispy_forms_tags %}
{% block title %}Реєстрація — Блог{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h2 class="mb-4 text-center" style="font-family:'Playfair Display',serif;">Реєстрація</h2>
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-accent w-100 mt-2">Зареєструватись</button>
      </form>
      <hr/>
      <p class="text-center text-muted small mb-0">Вже є акаунт? <a href="{% url 'accounts:login' %}">Увійти</a></p>
    </div>
  </div>
</div>
{% endblock %}
