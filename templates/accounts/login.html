{% extends "base/base.html" %}
{% load crispy_forms_tags %}
{% block title %}Вхід — Блог{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h2 class="mb-4 text-center" style="font-family:'Playfair Display',serif;">Вхід</h2>
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-accent w-100 mt-2">Увійти</button>
      </form>
      <div class="text-center mt-3">
        <a href="{% url 'accounts:password_reset' %}" class="small text-muted">Забули пароль?</a>
      </div>
      <hr/>
      <p class="text-center text-muted small mb-0">Ще немає акаунту? <a href="{% url 'accounts:register' %}">Зареєструватись</a></p>
    </div>
  </div>
</div>
{% endblock %}
