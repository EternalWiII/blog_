{% extends "base/base.html" %}
{% block title %}Видалити пост — Блог{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4 text-center">
      <i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem;"></i>
      <h3 class="mt-3" style="font-family:'Playfair Display',serif;">Видалити пост?</h3>
      <p class="text-muted">Ви впевнені, що хочете видалити пост <strong>«{{ post.title }}»</strong>? Цю дію не можна скасувати.</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Так, видалити</button>
        <a href="{{ post.get_absolute_url }}" class="btn btn-outline-secondary">Скасувати</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
